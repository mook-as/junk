name: Install WSL
on:
  workflow_dispatch: {}
  push: {}
permissions: {}
jobs:
  install:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
    - name: "Windows: Update any pre-installed WSL"
      run: |
        # Sometimes this results in a HTTP 403 for some reason; in that case, we
        # need to retry.
        do {
          wsl --update
        } while ( -not $? )
        wsl --set-default-version 2

    - run: wsl --install Debian --no-launch

    - run: |
        # Install Debian, but do not launch it

        curl.exe -O https://wsldownload.azureedge.net/TheDebianProject.DebianGNULinux_1.12.2.0_neutral___76v4gfsz19hv4.AppxBundle
        Add-AppxPackage *.AppxBundle
        # Initialize Debian, without going through any first-time setup
        debian.exe install --root
      shell: powershell
    
    - run: >-
        wsl.exe -d Debian --exec /usr/bin/env DEBIAN_FRONTEND=noninteractive
        sh -c 'apt-get update && apt-get install --yes coreutils curl'
